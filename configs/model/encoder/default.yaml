encoder_type: RoPE Encoder
encoder_params:
  n_feats: ${model.n_feats}
  # 主干隐藏通道（与 Transformer/投影等对齐）
  n_channels: 256
  # 新增：前端嵌入与prenet通道（与 ckpt 前端对齐）
  embed_channels: 192
  filter_channels: 768
  filter_channels_dp: 256
  n_heads: 2
  n_layers: 6
  kernel_size: 3
  p_dropout: 0.1
  spk_emb_dim: 64
  n_spks: 1
  prenet: true

duration_predictor_params:
  filter_channels_dp: ${model.encoder.encoder_params.filter_channels_dp}
  kernel_size: 3
  p_dropout: ${model.encoder.encoder_params.p_dropout}
